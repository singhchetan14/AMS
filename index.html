<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard | Academic Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2 class="sidebar-title">Academic Management System</h2>
        <nav class="nav-menu" aria-label="Sidebar Navigation">
          <a class="nav-link clickable" data-page="dashboard" href="index.html">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 1 1-9-9" />
              <path d="M12 3a9 9 0 0 1 9 9h-9z" />
            </svg>
            <span>Dashboard</span>
          </a>
          <a class="nav-link clickable" data-page="upload-materials" href="upload-materials.html">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 3v12" />
              <path d="m7 8 5-5 5 5" />
              <rect x="4" y="15" width="16" height="6" rx="2" />
            </svg>
            <span>Upload Materials</span>
          </a>
          <a class="nav-link clickable" data-page="upload-grades" href="upload-grades.html">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m12 2 3.1 6.3L22 9.3l-5 4.9 1.2 6.9L12 17.8 5.8 21l1.2-6.9L2 9.3l6.9-1z" />
            </svg>
            <span>Upload Grades</span>
          </a>
          <a class="nav-link clickable" data-page="view-students" href="view-students.html">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="8" r="3" />
              <path d="M3 19c0-3 2.4-5 6-5s6 2 6 5" />
              <circle cx="17" cy="9" r="2" />
              <path d="M14 19c.4-1.9 1.9-3 4-3 2.5 0 4 1.4 4 3" />
            </svg>
            <span>View Students</span>
          </a>
          <a class="nav-link clickable" data-page="profile" href="profile.html">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-6 8-6s8 2 8 6" />
            </svg>
            <span>Profile</span>
          </a>
        </nav>
      </aside>

      <main class="main">
        <header class="top-header">
          <div class="greeting">
            <h1>
              Hello,
              <span id="teacher-name" data-dynamic="session-username">Name</span>
            </h1>
            <!-- PHP: echo session username here -->
            <p>What would you like to do today?</p>
          </div>
          <button class="avatar-btn clickable" id="profile-button" type="button" aria-label="Open Profile">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-6 8-6s8 2 8 6" />
            </svg>
          </button>
        </header>

        <section class="card-grid" aria-label="Dashboard Stats">
          <article class="card stat-card" id="assigned-courses-card" data-stat-card="assigned-courses">
            <h3>Assigned Courses</h3>
            <div class="stat-value" id="assigned-courses-count" data-value="assigned-courses">--</div>
          </article>
          <article class="card stat-card" id="total-students-card" data-stat-card="total-students">
            <h3>Total Students</h3>
            <div class="stat-value" id="total-students-count" data-value="total-students">--</div>
          </article>
        </section>

        <section class="schedule-card" id="schedule-card" data-section="today-schedule">
          <h2>Today's Schedule</h2>
          <ul id="schedule-list" class="schedule-list" data-dynamic="schedule-list"></ul>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
