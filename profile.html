<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Academic Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="no-sidebar">
    <div class="layout" style="min-height: 100vh; background-color: #0d1b2a; display: flex; align-items: center; justify-content: center;">
      <main class="main" style="width: 100%; max-width: 700px; padding: 20px;">
        <div class="profile-settings-card" style="background-color: #1b304c; border-radius: 12px; padding: 40px; color: #fff; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);">
          <h2 style="font-size: 24px; font-weight: 400; margin-bottom: 40px; font-family: sans-serif;">Profile Settings</h2>
          
          <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 30px;">
            <div style="width: 120px; height: 120px; border-radius: 50%; background-color: #7b889b; border: 3px solid #0d1b2a; margin-bottom: 16px;"></div>
            <button style="background-color: #1967d2; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: sans-serif;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
              Change Photo
            </button>
          </div>

          <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px;">
            <div>
              <label style="display: block; margin-bottom: 8px; font-size: 14px; font-family: sans-serif; color: #e2e8f0;">Full Name</label>
              <input type="text" style="width: 100%; box-sizing: border-box; background-color: #7b889b; border: 1px solid #0d1b2a; padding: 12px 16px; border-radius: 20px; color: #fff; outline: none; font-family: sans-serif;" />
            </div>
            <div>
              <label style="display: block; margin-bottom: 8px; font-size: 14px; font-family: sans-serif; color: #e2e8f0;">Email</label>
              <input type="email" style="width: 100%; box-sizing: border-box; background-color: #7b889b; border: 1px solid #0d1b2a; padding: 12px 16px; border-radius: 20px; color: #fff; outline: none; font-family: sans-serif;" />
            </div>
            <div>
              <label style="display: block; margin-bottom: 8px; font-size: 14px; font-family: sans-serif; color: #e2e8f0;">New Password</label>
              <input type="password" style="width: 100%; box-sizing: border-box; background-color: #7b889b; border: 1px solid #0d1b2a; padding: 12px 16px; border-radius: 20px; color: #fff; outline: none; font-family: sans-serif;" />
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; max-width: 120px;">
            <button style="background-color: #1967d2; color: #fff; border: none; border-radius: 20px; padding: 10px 24px; font-size: 14px; cursor: pointer; font-family: sans-serif; text-align: center;">Update</button>
            <button style="background-color: #1967d2; color: #fff; border: none; border-radius: 20px; padding: 10px 24px; font-size: 14px; cursor: pointer; font-family: sans-serif; text-align: center;">Logout</button>
          </div>
        </div>
      </main>
    </div>

  </body>
</html>
