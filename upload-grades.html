<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Grades | Academic Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="no-sidebar">
    <div class="layout" style="min-height: 100vh; background-color: #0d1b2a; display: flex; align-items: center; justify-content: center; padding: 20px;">
      <main class="main" style="width: 100%; max-width: 900px; padding: 0;">
        <div class="upload-card" style="background-color: #1b304c; border-radius: 12px; color: #fff; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); overflow: hidden;">
          <div style="padding: 40px;">
            <a href="javascript:history.back()" style="display: inline-flex; align-items: center; gap: 8px; color: #fff; text-decoration: none; margin-bottom: 30px; font-family: sans-serif; font-size: 14px;">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 8 8 12 12 16"></polyline>
                <line x1="16" y1="12" x2="8" y2="12"></line>
              </svg>
              Back
            </a>
            <h2 style="font-size: 18px; font-weight: normal; margin-bottom: 30px; font-family: sans-serif; color: #fff;">Upload Grades</h2>

            <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px;">
              <div>
                <label style="display: block; margin-bottom: 8px; font-size: 16px; font-family: sans-serif; color: #fff; font-weight: normal;">Group</label>
                <div class="select-wrapper">
                  <select style="width: 100%; box-sizing: border-box; background-color: transparent; border: 1px solid #7b889b; padding: 12px 16px; color: #7b889b; outline: none; font-family: sans-serif; font-size: 14px; appearance: none; border-radius: 4px;">
                    <option value="" disabled selected>Select Group</option>
                  </select>
                </div>
              </div>
              <div>
                <label style="display: block; margin-bottom: 8px; font-size: 16px; font-family: sans-serif; color: #fff; font-weight: normal;">Course</label>
                <div class="select-wrapper">
                  <select style="width: 100%; box-sizing: border-box; background-color: transparent; border: 1px solid #7b889b; padding: 12px 16px; color: #7b889b; outline: none; font-family: sans-serif; font-size: 14px; appearance: none; border-radius: 4px;">
                    <option value="" disabled selected>Select a course</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div style="border-top: 1px solid #7b889b; padding: 20px 40px 40px 40px; background-color: #1b304c;">
            <div style="font-family: sans-serif; font-size: 16px; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-weight: normal;">
              Course <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg> Course Name
            </div>
            
            <div style="background-color: #3b526b; border-radius: 8px; padding: 10px 0;">
              <table style="width: 100%; border-collapse: collapse; font-family: sans-serif; color: #fff; text-align: left; font-size: 15px;">
                <thead>
                  <tr style="color: #92a2b8; font-size: 15px;">
                    <th style="padding: 10px 30px; font-weight: normal; width: 10%;">S No.</th>
                    <th style="padding: 10px 20px; font-weight: normal; width: 30%;">Student Name</th>
                    <th style="padding: 10px 20px; font-weight: normal; text-align: center; width: 20%;">Score out<br>of 100</th>
                    <th style="padding: 10px 20px; font-weight: normal; width: 15%;">Status</th>
                    <th style="padding: 10px 30px; font-weight: normal; text-align: right; width: 25%;">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style="padding: 16px 30px;">101</td>
                    <td style="padding: 16px 20px;">Student Name</td>
                    <td style="padding: 16px 20px; text-align: center;">81</td>
                    <td style="padding: 16px 20px;">Pass</td>
                    <td style="padding: 16px 30px; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 16px;">
                      <a href="edit-student.html" style="color: #fff; text-decoration: none;">Edit</a> <div style="width: 1px; height: 16px; background-color: #7b889b;"></div> <a href="#" onclick="alert('Student records deleted!'); return false;" style="color: #fff; text-decoration: none;">Delete</a>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 16px 30px;">102</td>
                    <td style="padding: 16px 20px;">Student Name</td>
                    <td style="padding: 16px 20px; text-align: center;">79</td>
                    <td style="padding: 16px 20px;">Pass</td>
                    <td style="padding: 16px 30px; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 16px;">
                      <a href="edit-student.html" style="color: #fff; text-decoration: none;">Edit</a> <div style="width: 1px; height: 16px; background-color: #7b889b;"></div> <a href="#" onclick="alert('Student records deleted!'); return false;" style="color: #fff; text-decoration: none;">Delete</a>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 16px 30px;">103</td>
                    <td style="padding: 16px 20px;">Student Name</td>
                    <td style="padding: 16px 20px; text-align: center;">68</td>
                    <td style="padding: 16px 20px;">Pass</td>
                    <td style="padding: 16px 30px; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 16px;">
                      <a href="edit-student.html" style="color: #fff; text-decoration: none;">Edit</a> <div style="width: 1px; height: 16px; background-color: #7b889b;"></div> <a href="#" onclick="alert('Student records deleted!'); return false;" style="color: #fff; text-decoration: none;">Delete</a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

  </body>
</html>
